name: Sync Ruleset

# ── 触发条件 ─────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write          # 需要推送到 ruleset 分支

jobs:
  sync:
    name: Sync & compile rulesets
    runs-on: ubuntu-latest

    steps:
      # ── 1. 下载本仓库最新 release 的 linux-x86_64 二进制 ──────────────────
      - name: Download latest reflex binary
        run: |
          DOWNLOAD_URL=$(curl -sSf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.assets[] | select(.name | test("linux-x86_64\\.tar\\.gz$")) | .browser_download_url')

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::No linux-x86_64 release asset found"
            exit 1
          fi

          echo "Downloading: $DOWNLOAD_URL"
          curl -sSfL "$DOWNLOAD_URL" -o reflex.tar.gz
          tar -xzf reflex.tar.gz
          chmod +x reflex
          ./reflex --version

      # ── 2. 拉取 meta-rules-dat sing 分支 ──────────────────────────────────
      - name: Checkout meta-rules-dat (sing branch)
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/meta-rules-dat
          ref: sing
          path: meta-rules-dat
          # 只拉取规则目录，节省时间
          sparse-checkout: |
            geo/geosite
            geo/geoip
          sparse-checkout-cone-mode: false

      # ── 3. 编译 geosite JSON → .rrs ───────────────────────────────────────
      - name: Compile geosite rules
        run: |
          GEOSITE_SRC="meta-rules-dat/geo/geosite"
          GEOSITE_OUT="out/geosite"
          mkdir -p "$GEOSITE_OUT"

          ok=0; fail=0
          for json_file in "$GEOSITE_SRC"/*.json; do
            [ -f "$json_file" ] || continue
            base=$(basename "$json_file" .json)
            rrs_file="$GEOSITE_OUT/${base}.rrs"

            # 同时保留 .json
            cp "$json_file" "$GEOSITE_OUT/${base}.json"

            if ./reflex ruleset "$json_file" -o "$rrs_file"; then
              ok=$((ok + 1))
            else
              echo "::warning::Failed to compile geosite/${base}.json"
              fail=$((fail + 1))
            fi
          done

          echo "geosite: compiled $ok files, $fail failed"
          ls -lh "$GEOSITE_OUT" | tail -5

      # ── 4. 编译 geoip JSON → .rrs ─────────────────────────────────────────
      - name: Compile geoip rules
        run: |
          GEOIP_SRC="meta-rules-dat/geo/geoip"
          GEOIP_OUT="out/geoip"
          mkdir -p "$GEOIP_OUT"

          ok=0; fail=0
          for json_file in "$GEOIP_SRC"/*.json; do
            [ -f "$json_file" ] || continue
            base=$(basename "$json_file" .json)
            rrs_file="$GEOIP_OUT/${base}.rrs"

            cp "$json_file" "$GEOIP_OUT/${base}.json"

            if ./reflex ruleset "$json_file" -o "$rrs_file"; then
              ok=$((ok + 1))
            else
              echo "::warning::Failed to compile geoip/${base}.json"
              fail=$((fail + 1))
            fi
          done

          echo "geoip: compiled $ok files, $fail failed"
          ls -lh "$GEOIP_OUT" | tail -5

      # ── 5. 检出本仓库的 ruleset 分支（不存在则自动建立孤立分支）──────────
      - name: Checkout ruleset branch
        uses: actions/checkout@v4
        with:
          ref: ruleset
          path: ruleset-branch
          # 分支不存在时不报错，后续步骤自行处理
          fetch-depth: 0
        continue-on-error: true   # 分支不存在时允许失败

      - name: Ensure ruleset branch exists
        run: |
          if [ ! -d "ruleset-branch/.git" ]; then
            echo "ruleset branch does not exist, creating orphan branch..."
            mkdir -p ruleset-branch
            cd ruleset-branch
            git init
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git checkout --orphan ruleset
            # 创建初始提交，让分支存在
            echo "# Reflex Ruleset" > README.md
            echo "" >> README.md
            echo "Auto-synced from [MetaCubeX/meta-rules-dat](https://github.com/MetaCubeX/meta-rules-dat) (sing branch)." >> README.md
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: initialize ruleset branch"
            git push origin ruleset
          else
            cd ruleset-branch
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
          fi

      # ── 6. 将编译产物同步到 ruleset 分支 ──────────────────────────────────
      - name: Sync files to ruleset branch
        run: |
          cd ruleset-branch

          # 确保目标目录存在
          mkdir -p geosite geoip

          # 同步 geosite（先清空旧文件再放入新文件，保证删除的规则不残留）
          rm -f geosite/*.json geosite/*.rrs
          cp ../out/geosite/*.json geosite/ 2>/dev/null || true
          cp ../out/geosite/*.rrs  geosite/ 2>/dev/null || true

          # 同步 geoip
          rm -f geoip/*.json geoip/*.rrs
          cp ../out/geoip/*.json geoip/ 2>/dev/null || true
          cp ../out/geoip/*.rrs  geoip/ 2>/dev/null || true

          # 统计
          GEOSITE_JSON=$(ls geosite/*.json 2>/dev/null | wc -l)
          GEOSITE_RRS=$(ls  geosite/*.rrs  2>/dev/null | wc -l)
          GEOIP_JSON=$(ls   geoip/*.json   2>/dev/null | wc -l)
          GEOIP_RRS=$(ls    geoip/*.rrs    2>/dev/null | wc -l)
          echo "geosite: ${GEOSITE_JSON} json, ${GEOSITE_RRS} rrs"
          echo "geoip:   ${GEOIP_JSON} json, ${GEOIP_RRS} rrs"

      # ── 7. 提交并推送（内容无变化时跳过）─────────────────────────────────
      - name: Commit and push
        run: |
          cd ruleset-branch

          git add geosite/ geoip/

          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
            exit 0
          fi

          # 提交信息包含来源 commit SHA，方便溯源
          META_SHA=$(cd ../meta-rules-dat && git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%d")

          git commit -m "chore: sync ruleset ${DATE} (meta-rules-dat@${META_SHA})"
          git push origin ruleset
