name: Build reflex (with built-in ruleset compiler)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target (default: aarch64-unknown-linux-musl)"
        required: false
        default: "aarch64-unknown-linux-musl"
        type: choice
        options:
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl

env:
  CARGO_TERM_COLOR: always
  FEATURES: outbound-net

jobs:
  build-reflex:
    name: Build reflex / ${{ github.event.inputs.target }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ github.event.inputs.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ github.event.inputs.target }}-cargo-reflex-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.event.inputs.target }}-cargo-reflex-

      # musl 工具链（x86_64）
      - name: Install musl-tools (x86_64)
        if: github.event.inputs.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      # aarch64 用 cross 交叉编译
      - name: Install cross (aarch64)
        if: github.event.inputs.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # ── 编译 reflex (x86_64) ─────────────────────────────────────────────
      - name: Build reflex (x86_64, native)
        if: github.event.inputs.target == 'x86_64-unknown-linux-musl'
        run: |
          cargo build \
            --release \
            --locked \
            --target ${{ github.event.inputs.target }} \
            --bin reflex \
            --features outbound-net
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc

      # ── 编译 reflex (aarch64) ────────────────────────────────────────────
      - name: Build reflex (aarch64, cross)
        if: github.event.inputs.target == 'aarch64-unknown-linux-musl'
        run: |
          cross build \
            --release \
            --locked \
            --target ${{ github.event.inputs.target }} \
            --bin reflex \
            --features outbound-net

      # ── 收集产物 ─────────────────────────────────────────────────────────
      - name: Collect binary
        run: |
          mkdir -p dist
          BIN_DIR="target/${{ github.event.inputs.target }}/release"
          ARTIFACT="reflex-${{ github.event.inputs.target }}"

          cp "$BIN_DIR/reflex" "dist/reflex"

          cd dist
          tar -czf "../${ARTIFACT}.tar.gz" reflex
          cd ..

          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"

          echo "=== Build output ==="
          ls -lh "${ARTIFACT}.tar.gz"
          cat    "${ARTIFACT}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reflex-${{ github.event.inputs.target }}
          path: |
            reflex-${{ github.event.inputs.target }}.tar.gz
            reflex-${{ github.event.inputs.target }}.tar.gz.sha256
          retention-days: 7
